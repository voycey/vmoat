# worktree-vm.conf — per-project config for `worktree-vm`.
# Copy to your repo root as `worktree-vm.conf`. This file is SHELL-SOURCED, so
# it must be valid shell (KEY="value"). It is trusted project code (same trust
# as the build command it runs).

# --- VM sizing -------------------------------------------------------------
VM_CPU=6
VM_MEMORY=16        # GiB. Floor for a non-trivial stack; raise for heavy builds.
VM_DISK=80          # GiB. Allow for duplicated container images per VM.

# VM backend is auto-detected per platform (macOS -> vz+virtiofs; Linux/WSL2 ->
# Colima's native qemu+KVM). Only set these to FORCE a backend:
# VM_TYPE="qemu"
# MOUNT_TYPE="sshfs"

# Host path mounted WRITABLE into the VM. Must contain this worktree AND the
# main checkout (for seeded gitignored files). $HOME is the safe default.
VM_MOUNT="$HOME"

# --- provisioning (run once per VM) ----------------------------------------
# apt packages your build/test commands need that Colima's VM lacks:
PROVISION_APT="git jq curl ca-certificates"

# arbitrary shell to install anything apt can't (runs in the VM, has sudo):
PROVISION_SCRIPT='command -v dotenvx >/dev/null 2>&1 || curl -sfS https://dotenvx.sh | sudo sh'

# gitignored files to copy from the main checkout into a fresh worktree so the
# build can run (e.g. dotenvx private keys). Space-separated, repo-relative.
PROVISION_SEED=".env.keys"

# --- commands (run INSIDE the VM, cd'd to the worktree) --------------------
CMD_UP="./deploy.sh local"
CMD_TEST="./deploy.sh test"     # `worktree-vm test --quick` appends "--quick"

# --- health gate (polled inside the VM after `up`) -------------------------
HEALTH_URL="http://127.0.0.1:38003/health"
HEALTH_TIMEOUT=2400             # first build can be 10-20 min; be generous

# --- ports the `tunnel` command can surface to the host --------------------
EXPOSE_UI=30001                 # `worktree-vm tunnel ui`
EXPOSE_API=38003                # `worktree-vm tunnel api`
