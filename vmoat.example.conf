# vmoat.conf — per-project config for `vmoat`.
# Copy to your repo root as `vmoat.conf`. SHELL-SOURCED, so it must be valid
# shell (KEY="value"); it is trusted project code (same trust as the commands
# it runs). The ONLY required setting is CMD_UP — everything else is optional.

# --- VM sizing -------------------------------------------------------------
VM_CPU=4
VM_MEMORY=8         # GiB. Raise for heavy stacks/builds.
VM_DISK=60          # GiB. Allow for container images duplicated per VM.

# VM backend is auto-detected (macOS -> vz+virtiofs; Linux/WSL2 -> Colima's
# native qemu+KVM). Only set these to FORCE a backend:
# VM_TYPE="qemu"
# MOUNT_TYPE="sshfs"

# Host path mounted WRITABLE into the VM. Must contain this worktree (and, if
# you use PROVISION_SEED, the main checkout). $HOME is the safe default.
VM_MOUNT="$HOME"

# --- provisioning (all optional; run once per VM) --------------------------
# Extra apt packages your build/test commands need that the base VM lacks:
# PROVISION_APT="git make jq"

# Arbitrary shell to install anything apt can't (runs in the VM, has sudo).
# Example — ONLY if your project uses dotenvx for encrypted .env files:
# PROVISION_SCRIPT='command -v dotenvx >/dev/null 2>&1 || curl -sfS https://dotenvx.sh | sudo sh'

# Gitignored files to copy from the main checkout into a fresh worktree so the
# build can run (space-separated, repo-relative) — e.g. local secrets/keys:
# PROVISION_SEED=".env.keys config/local.yaml"

# --- commands (run INSIDE the VM, cd'd to the worktree) --------------------
CMD_UP="docker compose up -d --wait"   # REQUIRED: brings the stack up
# CMD_TEST="docker compose exec -T app pytest"   # optional; `vmoat test --quick` appends "--quick"

# --- health gate (optional) ------------------------------------------------
# If set, `up` polls this URL inside the VM until it returns 2xx. Omit to skip.
# HEALTH_URL="http://127.0.0.1:8080/health"
# HEALTH_TIMEOUT=1800            # seconds; first build can be 10-20 min

# --- ports surfaced to the host by `tunnel` (optional) ---------------------
# `vmoat tunnel` forwards each of these; `vmoat tunnel <port>` forwards one.
# Bash array (preferred) or a space-separated string both work.
# These are the shared defaults. For a worktree that runs different code and
# needs different ports, override them in a gitignored vmoat.local.conf in that
# worktree (sourced after this file, so it wins). Same for any key above.
EXPOSE_PORTS=(8080)
